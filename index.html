<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hatchlets</title>
<img src="dalton-dragon.png" alt="Dalton the Dragon" class="dalton">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #312e81 50%, #1e3a8a 100%);
      color: white;
      text-align: center;
      padding: 40px 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 18px;
      color: #fde68a;
      margin-bottom: 30px;
    }

    .box {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 25px;
      max-width: 500px;
      margin: 0 auto;
      box-shadow: 0 18px 50px rgba(0,0,0,0.22);
    }

    input {
      padding: 14px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      width: 80%;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      padding: 14px 24px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .result {
      margin-top: 30px;
      min-height: 180px;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 20px;
      max-width: 460px;
      margin: 0 auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.35);
      animation: popIn 0.45s ease;
      position: relative;
      overflow: hidden;
    }

    .card.common {
      border: 2px solid #94a3b8;
      box-shadow: 0 0 18px rgba(148,163,184,0.28);
    }

    .card.rare {
      border: 2px solid #60a5fa;
      box-shadow: 0 0 24px rgba(96,165,250,0.38);
    }

    .card.epic {
      border: 2px solid #c084fc;
      box-shadow: 0 0 28px rgba(192,132,252,0.4);
    }

    .card.legendary {
      border: 2px solid #fbbf24;
      box-shadow: 0 0 34px rgba(251,191,36,0.55);
    }

    .emoji {
      font-size: 64px;
      margin-bottom: 8px;
      animation: floaty 2s ease-in-out infinite;
    }

    .rarity-badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .badge-common {
      background: rgba(148,163,184,0.18);
      color: #cbd5e1;
    }

    .badge-rare {
      background: rgba(96,165,250,0.18);
      color: #bfdbfe;
    }

    .badge-epic {
      background: rgba(192,132,252,0.18);
      color: #e9d5ff;
    }

    .badge-legendary {
      background: rgba(251,191,36,0.18);
      color: #fde68a;
    }

    .btn-forever {
      display: inline-block;
      margin-top: 15px;
      background: #8b5cf6;
      padding: 12px 20px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn-forever:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .error {
      color: #f87171;
      font-size: 18px;
      animation: popIn 0.25s ease;
    }

    .hatching {
      margin: 0 auto;
      max-width: 420px;
      padding: 28px 20px;
      border-radius: 20px;
      background: rgba(17,24,39,0.8);
      box-shadow: 0 0 26px rgba(255,255,255,0.08);
      animation: popIn 0.3s ease;
    }

    .egg {
      font-size: 80px;
      display: inline-block;
      margin-bottom: 12px;
      animation: shakeEgg 0.7s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
    }

    .hatch-text {
      font-size: 20px;
      color: #fde68a;
      margin-top: 8px;
      animation: pulseText 1s ease-in-out infinite;
    }

    .sparkles {
      font-size: 28px;
      margin-top: 6px;
      animation: sparkleFlash 0.8s ease-in-out infinite;
    }

    @keyframes shakeEgg {
      0% { transform: rotate(0deg) scale(1); }
      20% { transform: rotate(-10deg) scale(1.03); }
      40% { transform: rotate(8deg) scale(1.05); }
      60% { transform: rotate(-6deg) scale(1.04); }
      80% { transform: rotate(5deg) scale(1.02); }
      100% { transform: rotate(0deg) scale(1); }
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 1; }
    }

    @keyframes sparkleFlash {
      0%, 100% { opacity: 0.4; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.92) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>

    function rarityClass(rarity) {
      return rarity.toLowerCase();
    }

    function badgeClass(rarity) {

    function redeemCode() {
      const input = document.getElementById("codeInput").value.trim().toUpperCase();
      const result = document.getElementById("result");
      const hatchlet = hatchletCodes[input];

      if (!hatchlet) {
        result.innerHTML = `<div class="error">❌ Invalid code... try again!</div>`;
        return;
      }

      result.innerHTML = `
        <div class="hatching">
          <div class="egg">🥚</div>

        `;
      }, 1400);
