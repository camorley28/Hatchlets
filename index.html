      text-align: center;
      padding: 40px 20px;
    }

      margin-bottom: 8px;
    }

      font-size: 18px;
      color: #fde68a;
      margin-bottom: 30px;
    }

      border-radius: 20px;
      padding: 25px;
      max-width: 500px;
      margin: 0 auto;
    }

      padding: 14px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      width: 80%;
      margin-bottom: 15px;
    }

    button {
      padding: 14px 24px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 30px;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 16px;
      max-width: 450px;
      margin: 0 auto;
    }

    .emoji {
      font-size: 60px;
    }

    .btn-forever {
      display: inline-block;
      margin-top: 15px;
      background: #8b5cf6;
      padding: 12px 20px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .error {
      color: #f87171;
      font-size: 18px;

    function redeemCode() {
      const input = document.getElementById("codeInput").value.trim().toUpperCase();
      const result = document.getElementById("result");
      const hatchlet = hatchletCodes[input];

      if (hatchlet) {
        result.innerHTML = `
          <div class="card">
            <div class="emoji">${hatchlet.emoji}</div>
            <h2>${hatchlet.name} hatched!</h2>
            <p><strong>Species:</strong> ${hatchlet.species}</p>
            <p><strong>Rarity:</strong> ${hatchlet.rarity}</p>
            <p><strong>Type:</strong> ${hatchlet.type}</p>
            <p><strong>Personality:</strong> ${hatchlet.personality}</p>

            <a href="foreverland.html" class="btn-forever">
              Enter ForeverLand
            </a>
          </div>
        `;
      } else {
        result.innerHTML = `<div class="error">❌ Invalid code... try again!</div>`;
      }
    }
